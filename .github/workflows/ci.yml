name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Rust tests, lints, formatting
        run: |
          cargo test --manifest-path planner/Cargo.toml
          cargo clippy --manifest-path planner/Cargo.toml --all-targets -- -D warnings
          cargo fmt --manifest-path planner/Cargo.toml --check
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM package
        run: wasm-pack build planner --target web --out-dir pkg
      - name: Web typecheck, lint, build
        working-directory: web
        run: |
          npm ci
          npx tsc -b
          npm run lint
          npm run build
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: web/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
